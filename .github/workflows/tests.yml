name: Tests

on:
  push:
    branches: [main]
  pull_request:

# Mínimos privilegios: la suite sólo necesita leer el código.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      # Actions de terceros fijadas por SHA (tag en el comentario).
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          # No persistir el GITHUB_TOKEN en el git config del runner.
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt "pytest>=8,<9"

      - name: Run tests
        run: pytest -q
