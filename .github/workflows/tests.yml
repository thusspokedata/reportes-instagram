name: Tests

on:
  push:
    branches: [main]
  pull_request:

# Mínimos privilegios: la suite sólo necesita leer el código.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      # Actions de terceros fijadas por SHA (tag en el comentario).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # No persistir el GITHUB_TOKEN en el git config del runner.
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt "pytest>=8,<9"

      - name: Run tests
        run: pytest -q
